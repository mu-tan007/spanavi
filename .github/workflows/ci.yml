# CI: テスト + ビルド + Edge Function 同期チェック
# 金額計算等の規約テスト (src/utils/*.test.js) が落ちる push を検知する。
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Edge Function 同期チェックで git log を使うため全履歴取得

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 依存関係インストール
        run: npm ci

      - name: テスト (vitest)
        run: npm test

      - name: ビルド
        run: npm run build

      # GitHub Secrets に SUPABASE_ACCESS_TOKEN を設定すると有効化される。
      # 未設定の場合はスクリプト側でスキップ（exit 0）する。
      - name: Edge Function 同期チェック
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/check-edge-functions.mjs
